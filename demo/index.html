<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>card-foil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root[data-theme="dark"] {
      --bg: #111;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-muted: #666;
      --toggle-bg: #222;
      --toggle-border: #333;
      --thumb: #fff;
      --link: #888;
    }
    :root[data-theme="light"] {
      --bg: #f1f1f1;
      --border: #d0d0d0;
      --text: #111;
      --text-muted: #888;
      --toggle-bg: #ddd;
      --toggle-border: #999;
      --thumb: #333;
      --link: #666;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 3rem 2rem;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      transition: background 0.2s, color 0.2s;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 900px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .header-links {
      display: flex;
      gap: 1.25rem;
      align-items: center;
    }
    .header-links a {
      font-size: 0.75rem;
      color: var(--link);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.15s;
    }
    .header-links a:hover { color: var(--text); }

    /* Switch component */
    .switch-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .switch input { display: none; }
    .track {
      position: absolute;
      inset: 0;
      background: var(--toggle-bg);
      border: 1px solid var(--toggle-border);
      border-radius: 10px;
      transition: 0.2s;
    }
    .thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 12px;
      height: 12px;
      background: var(--thumb);
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .track .thumb { transform: translateX(16px); }

    /* Cards */
    .cards {
      display: flex;
      gap: 2.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card-wrap {
      border-radius: 4.8% / 3.4%;
      overflow: visible;
      cursor: default;
      position: relative;
      display: inline-block;
    }
    .card-wrap img {
      display: block;
      width: 220px;
      border-radius: 4.8% / 3.4%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* Controls */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      width: 100%;
      max-width: 400px;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
    }
    .control-label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      min-width: 80px;
    }

    /* Slider */
    .slider-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
    }
    .intensity-value {
      font-size: 0.8rem;
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
      min-width: 2.5rem;
      text-align: right;
    }

    /* Toggle group */
    .toggle-group {
      display: flex;
      gap: 1.5rem;
    }
    .motion-note {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <header>
    <h1>card-foil</h1>
    <div class="header-links">
      <a href="https://github.com/sawyerWeld/card-foil" target="_blank">GitHub</a>
      <a href="https://www.npmjs.com/package/card-foil" target="_blank">npm</a>
    </div>
  </header>

  <div class="cards">
    <div class="card-wrap" id="c1">
      <img src="https://cards.scryfall.io/normal/front/b/d/bd8fa327-dd41-4737-8f19-2cf5eb1f7cdd.jpg" alt="Black Lotus">
    </div>
    <div class="card-wrap" id="c2">
      <img src="https://cards.scryfall.io/normal/front/2/3/2398892d-28e9-4009-81ec-0d544af79d2b.jpg" alt="Ancestral Recall">
    </div>
    <div class="card-wrap" id="c3">
      <img src="https://cards.scryfall.io/normal/front/7/0/70901356-3266-4bd9-aacc-f06c27271de5.jpg" alt="Time Walk">
    </div>
    <div class="card-wrap" id="c4">
      <img src="https://cards.scryfall.io/normal/front/e/a/ea1feac0-d3a7-45eb-9719-1cdaf51ea0b6.jpg" alt="Mox Sapphire">
    </div>
  </div>

  <div class="controls">
    <div class="control-row">
      <span class="control-label">Intensity</span>
      <div class="slider-wrap">
        <input type="range" id="intensity" min="0" max="2" step="0.05" value="1">
        <span class="intensity-value" id="intensity-val">1.00</span>
      </div>
    </div>
    <div class="control-row">
      <span class="control-label">Options</span>
      <div class="toggle-group">
        <label class="switch-row">
          <div class="switch">
            <input type="checkbox" id="chk-tilt" checked>
            <div class="track"><div class="thumb"></div></div>
          </div>
          <span>Tilt</span>
        </label>
        <label class="switch-row">
          <div class="switch">
            <input type="checkbox" id="chk-specular" checked>
            <div class="track"><div class="thumb"></div></div>
          </div>
          <span>Specular</span>
        </label>
        <label class="switch-row">
          <div class="switch">
            <input type="checkbox" id="chk-shimmer" checked>
            <div class="track"><div class="thumb"></div></div>
          </div>
          <span>Shimmer</span>
        </label>
        <label class="switch-row">
          <div class="switch">
            <input type="checkbox" id="theme-check">
            <div class="track"><div class="thumb"></div></div>
          </div>
          <span>Light</span>
        </label>
      </div>
    </div>
    <p class="motion-note" id="motion-note" hidden>
      Shimmer is disabled because your system requests reduced motion.
    </p>
  </div>

  <script>
    function initDemo(CardFoil) {
      const styleLink = document.createElement('link');
      styleLink.rel = 'stylesheet';
      styleLink.href = location.protocol === 'file:' ? '../dist/style.css' : '../src/card-foil.css';
      document.head.appendChild(styleLink);

    const finishes = ['foil', 'etched', 'galaxy', 'oil-slick'];
    const foils = ['c1', 'c2', 'c3', 'c4'].map((id, index) =>
      new CardFoil(document.getElementById(id), {
        finish: finishes[index],
        shimmer: true,
      })
    );

    const slider = document.getElementById('intensity');
    const valDisplay = document.getElementById('intensity-val');
    const shimmerCheckbox = document.getElementById('chk-shimmer');
    const motionNote = document.getElementById('motion-note');
    const reducedMotionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');

    function syncMotionUi() {
      const reducedMotion = reducedMotionQuery.matches;
      shimmerCheckbox.disabled = reducedMotion;
      shimmerCheckbox.checked = !reducedMotion;
      motionNote.hidden = !reducedMotion;
      foils.forEach(f => f.setShimmer(!reducedMotion));
    }

    slider.addEventListener('input', e => {
      const v = +e.target.value;
      valDisplay.textContent = v.toFixed(2);
      foils.forEach(f => f.setIntensity(v));
    });

    document.getElementById('chk-tilt').addEventListener('change', e => {
      foils.forEach(f => f.setTilt(e.target.checked));
    });

    document.getElementById('chk-specular').addEventListener('change', e => {
      foils.forEach(f => f.setSpecular(e.target.checked));
    });

    document.getElementById('chk-shimmer').addEventListener('change', e => {
      foils.forEach(f => f.setShimmer(e.target.checked));
    });

    document.getElementById('theme-check').addEventListener('change', e => {
      document.documentElement.setAttribute('data-theme', e.target.checked ? 'light' : 'dark');
    });

    syncMotionUi();
    reducedMotionQuery.addEventListener('change', syncMotionUi);
    }

    if (location.protocol === 'file:') {
      const browserScript = document.createElement('script');
      browserScript.src = '../dist/browser.js';
      browserScript.onload = () => initDemo(window.CardFoil);
      document.head.appendChild(browserScript);
    } else {
      window.__cardFoilInit = initDemo;

      const moduleScript = document.createElement('script');
      moduleScript.type = 'module';
      moduleScript.textContent = `
        import { CardFoil } from '../src/index.js';
        window.__cardFoilInit(CardFoil);
      `;
      document.body.appendChild(moduleScript);
    }
  </script>
</body>
</html>
