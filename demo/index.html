<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>card-foil demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 3rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #aaa;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .cards {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card-wrap {
      border-radius: 4.8% / 3.4%;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      display: inline-block;
    }
    .card-wrap img {
      display: block;
      width: 240px;
      border-radius: 4.8% / 3.4%;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      color: #888;
      font-size: 0.875rem;
    }
    input[type=range] { width: 120px; accent-color: #a78bfa; }
  </style>
</head>
<body>
  <h1>card-foil ✨</h1>
  <div class="cards">
    <div class="card-wrap" id="c1">
      <img src="https://cards.scryfall.io/normal/front/b/d/bd8fa327-dd41-4737-8f19-2cf5eb1f7cdd.jpg" alt="Black Lotus" crossorigin="anonymous">
    </div>
    <div class="card-wrap" id="c2">
      <img src="https://cards.scryfall.io/normal/front/2/3/2398892d-28e9-4009-81ec-0d544af79d2b.jpg" alt="Ancestral Recall" crossorigin="anonymous">
    </div>
    <div class="card-wrap" id="c3">
      <img src="https://cards.scryfall.io/normal/front/7/0/70901356-3266-4bd9-aacc-f06c27271de5.jpg" alt="Time Walk" crossorigin="anonymous">
    </div>
    <div class="card-wrap" id="c4">
      <img src="https://cards.scryfall.io/normal/front/e/a/ea1feac0-d3a7-45eb-9719-1cdaf51ea0b6.jpg" alt="Mox Sapphire" crossorigin="anonymous">
    </div>
  </div>
  <div class="controls">
    <label>Intensity
      <input type="range" id="intensity" min="0" max="2" step="0.05" value="1">
    </label>
    <label><input type="checkbox" id="tilt" checked> Tilt</label>
    <label><input type="checkbox" id="specular" checked> Specular</label>
  </div>

  <script type="module">
    // Inline the CardFoil class so the demo works without a build step
    const GRADIENT = `repeating-linear-gradient(
      110deg,
      transparent 0%,
      rgba(255, 200, 50, 0.25) 8%,
      rgba(100, 220, 255, 0.18) 16%,
      rgba(200, 100, 255, 0.15) 24%,
      rgba(100, 255, 150, 0.18) 32%,
      rgba(255, 150, 50, 0.15) 40%,
      transparent 50%
    )`;

    const style = document.createElement('style');
    style.textContent = `
      @keyframes foil-shift {
        0% { background-position: 0% center; }
        100% { background-position: 100% center; }
      }
      @media (prefers-reduced-motion: no-preference) {
        .cf-overlay { animation: foil-shift 20s linear infinite; }
      }
      .cf-overlay {
        position: absolute; inset: 0; pointer-events: none;
        border-radius: inherit;
        background: ${GRADIENT};
        background-size: 200% 100%;
        mix-blend-mode: screen;
      }
    `;
    document.head.appendChild(style);

    class CardFoil {
      constructor(el, { intensity = 1, tilt = true, specular = true } = {}) {
        this.el = el; this.intensity = intensity; this.tilt = tilt; this.specular = specular;
        el.style.position = 'relative';

        this._foil = document.createElement('div');
        this._foil.className = 'cf-overlay';
        this._foil.style.opacity = intensity;
        el.appendChild(this._foil);

        if (specular) {
          this._spec = document.createElement('div');
          Object.assign(this._spec.style, {
            position: 'absolute', inset: '0', pointerEvents: 'none',
            borderRadius: 'inherit', mixBlendMode: 'overlay', opacity: '0',
            transition: 'opacity 0.2s',
          });
          el.appendChild(this._spec);
        }

        this._onMove = this._onMove.bind(this);
        this._onLeave = this._onLeave.bind(this);
        el.addEventListener('mousemove', this._onMove);
        el.addEventListener('mouseleave', this._onLeave);
      }

      _onMove(e) {
        const r = this.el.getBoundingClientRect();
        const mx = (e.clientX - r.left) / r.width;
        const my = (e.clientY - r.top) / r.height;
        this._foil.style.backgroundPosition = `${mx * 100}% ${my * 100}%`;
        if (this.tilt) {
          const rx = (my - 0.5) * -30;
          const ry = (mx - 0.5) * 30;
          this.el.style.transform = `perspective(600px) rotateX(${rx}deg) rotateY(${ry}deg)`;
          this.el.style.transition = 'transform 0.05s';
        }
        if (this._spec) {
          this._spec.style.opacity = '1';
          this._spec.style.background = `radial-gradient(circle at ${mx*100}% ${my*100}%, rgba(255,255,255,0.35) 0%, transparent 55%)`;
        }
      }

      _onLeave() {
        this._foil.style.backgroundPosition = '';
        if (this.tilt) { this.el.style.transform = ''; this.el.style.transition = 'transform 0.4s ease'; }
        if (this._spec) this._spec.style.opacity = '0';
      }

      setIntensity(v) { this.intensity = v; this._foil.style.opacity = v; }
      setTilt(v) { this.tilt = v; if (!v) this.el.style.transform = ''; }
      setSpecular(v) { this.specular = v; if (this._spec) this._spec.style.display = v ? '' : 'none'; }
      destroy() {
        this.el.removeEventListener('mousemove', this._onMove);
        this.el.removeEventListener('mouseleave', this._onLeave);
        this._foil.remove(); this._spec?.remove();
      }
    }

    const foils = ['c1','c2','c3','c4'].map(id => new CardFoil(document.getElementById(id)));

    document.getElementById('intensity').addEventListener('input', e => {
      foils.forEach(f => f.setIntensity(+e.target.value));
    });
    document.getElementById('tilt').addEventListener('change', e => {
      foils.forEach(f => f.setTilt(e.target.checked));
    });
    document.getElementById('specular').addEventListener('change', e => {
      foils.forEach(f => f.setSpecular(e.target.checked));
    });
  </script>
</body>
</html>
